<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xem Tất Cả Câu Hỏi Chi Tiết</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
        }
        .main-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .question-item {
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 20px;
            background: #f8f9fa;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .question-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateX(5px);
        }
        .answer-item {
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            background: white;
        }
        .correct-answer {
            background-color: #d4edda;
            border-left: 3px solid #28a745;
            font-weight: bold;
        }
        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .btn-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
        }
        .btn-custom:hover {
            background: linear-gradient(135deg, #5568d3 0%, #6a4093 100%);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1><i class="fas fa-list-ul"></i> Xem Tất Cả Câu Hỏi Chi Tiết</h1>
                <div>
                    <a href="/questions" class="btn btn-custom me-2">
                        <i class="fas fa-arrow-left"></i> Quay Lại
                    </a>
                    <a href="/" class="btn btn-outline-secondary">
                        <i class="fas fa-home"></i> Trang Chủ
                    </a>
                </div>
            </div>

            <!-- Thống kê -->
            <div class="stats-card">
                <div class="row text-center">
                    <div class="col-md-4">
                        <h3><i class="fas fa-question-circle"></i></h3>
                        <h2 th:text="${totalQuestions}">0</h2>
                        <p>Tổng số câu hỏi</p>
                    </div>
                    <div class="col-md-4">
                        <h3><i class="fas fa-check-circle"></i></h3>
                        <h2 th:text="${questions.size()}">0</h2>
                        <p>Câu hỏi hiện có</p>
                    </div>
                    <div class="col-md-4">
                        <h3><i class="fas fa-star"></i></h3>
                        <p>Câu hỏi đầu tiên:</p>
                        <small th:text="${firstQuestion != null ? firstQuestion : 'Không có'}">N/A</small>
                    </div>
                </div>
            </div>

            <!-- Danh sách câu hỏi -->
            <div th:if="${#lists.isEmpty(questions)}" class="alert alert-warning">
                <i class="fas fa-exclamation-triangle"></i> Không có câu hỏi nào để hiển thị!
            </div>

            <div th:each="question, iterStat : ${questions}" class="question-item">
                <h4 class="text-primary">
                    <i class="fas fa-question"></i> Câu <span th:text="${iterStat.count}"></span>
                </h4>
                <p class="fs-5 mb-3" th:text="${question.questionText}"></p>
                
                <div class="answers">
                    <div th:each="answer, answerStat : ${question.answers}" 
                         class="answer-item"
                         th:classappend="${answerStat.index == question.correctAnswerIndex} ? 'correct-answer' : ''">
                        <strong th:text="${'ABCD'.charAt(answerStat.index)} + '. '"></strong>
                        <span th:text="${answer}"></span>
                        <span th:if="${answerStat.index == question.correctAnswerIndex}" 
                              class="badge bg-success float-end">
                            <i class="fas fa-check"></i> Đúng
                        </span>
                    </div>
                </div>
                
                <div class="mt-3 text-muted small">
                    <i class="fas fa-info-circle"></i> ID: <span th:text="${question.id}"></span> | 
                    Số đáp án: <span th:text="${question.answers.size()}"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
